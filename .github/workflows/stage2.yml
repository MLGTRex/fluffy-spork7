name: Stage 2 (manual)

# Manual dispatch only — runs Stage 2's main.py in isolation against the
# current target_company_list.json. Useful for debugging Stage 2 changes
# without re-running Stage 1.
on:
  workflow_dispatch:
    inputs:
      run_digest:
        description: 'Run the research digest stage (uncheck to skip — useful for A/B cost testing)'
        type: boolean
        default: true

permissions:
  contents: write

# Share the `pipeline` group so a stage-isolated run can't race with the
# full pipeline or another single-stage run.
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  stage2:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Stage 2
        run: |
          if [ "${{ inputs.run_digest }}" = "true" ]; then
            python "Stage 2 DRAFT/main.py" --digest
          else
            python "Stage 2 DRAFT/main.py" --no-digest
          fi

      - name: Commit & push state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "stage 2: manual run ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          for attempt in 1 2 3 4 5; do
            git pull --rebase --autostash origin main \
              && git push origin HEAD:main \
              && { echo "Pushed on attempt $attempt."; exit 0; }
            echo "Push attempt $attempt failed; retrying..."
            sleep 5
          done
          echo "Could not push state after 5 attempts." >&2
          exit 1
