name: Deploy Stage 6 UI to Pages

# Auto after every Stage 6 run; also on direct UI / output edits; also manual.
on:
   workflow_run:
      workflows: ["Stage 6 Consolidation"]
      types: [completed]
   workflow_dispatch:
   push:
      branches: [main]
      paths:
         - 'pipeline tools/ui/**'
         - 'Stage 6 DRAFT/output/**'

# GitHub Pages requires this exact permissions block + concurrency group.
permissions:
   contents: read
   pages: write
   id-token: write

concurrency:
   group: pages
   cancel-in-progress: false

jobs:
   deploy:
      runs-on: ubuntu-latest
      environment:
         name: github-pages
         url: ${{ steps.deployment.outputs.page_url }}
      steps:
         - name: Checkout
           uses: actions/checkout@v4

         - name: Assemble _site/
           run: |
              mkdir -p _site/data _site/admin/data/per_ticker_dossier

              # Public UI at /
              cp "pipeline tools/ui/public/index.html" _site/
              cp "pipeline tools/ui/public/styles.css" _site/
              cp "pipeline tools/ui/public/app.js"     _site/
              cp "Stage 6 DRAFT/output/public_summary.json" _site/data/ 2>/dev/null || true

              # Admin UI at /admin/ (gated by JS password — URL-obscurity, not real auth)
              cp "pipeline tools/ui/admin/index.html" _site/admin/
              cp "pipeline tools/ui/admin/styles.css" _site/admin/
              cp "pipeline tools/ui/admin/app.js"     _site/admin/
              cp "Stage 6 DRAFT/output/"*.json _site/admin/data/ 2>/dev/null || true
              cp "Stage 6 DRAFT/output/per_ticker_dossier/"*.json \
                 _site/admin/data/per_ticker_dossier/ 2>/dev/null || true
              # The public site MUST NOT carry the dossier or full data files.
              rm -f _site/data/portfolio_overview.json \
                    _site/data/portfolio_value_history.json \
                    _site/data/benchmark_history.json \
                    _site/data/positions_ledger.json \
                    _site/data/prediction_accuracy.json \
                    _site/data/runs_index.json \
                    _site/data/snapshots_index.json \
                    _site/data/data_quality.json 2>/dev/null || true

              touch _site/.nojekyll
              echo "Assembled _site/ — public ($(ls _site/data/ 2>/dev/null | wc -l) files), admin ($(ls _site/admin/data/ 2>/dev/null | wc -l) files, $(ls _site/admin/data/per_ticker_dossier/ 2>/dev/null | wc -l) dossiers)"
              ls -la _site/ _site/admin/

         - name: Configure Pages
           uses: actions/configure-pages@v5

         - name: Upload artifact
           uses: actions/upload-pages-artifact@v3
           with:
              path: _site

         - name: Deploy to GitHub Pages
           id: deployment
           uses: actions/deploy-pages@v4
