name: Test pipeline (manual)

# Test-only manual dispatch — runs Stages 2-4 against arbitrary tickers
# entered at dispatch time. Restores Stage 1's target_company_list.json
# before exit so production state is untouched.
on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated. Bare (MSFT,NVDA) or full ("Microsoft Corp (MSFT),Nvidia (NVDA)").'
        required: true
        type: string

# Allow the default GITHUB_TOKEN to commit any new Stage 2-4 outputs back.
permissions:
  contents: write

# Share the `pipeline` group so a test can never race with a real pipeline run.
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  test_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test pipeline
        run: python "pipeline tools/runTestPipeline.py" --tickers "${{ inputs.tickers }}"

      - name: Commit & push state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "test pipeline: ${{ inputs.tickers }} ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          for attempt in 1 2 3 4 5; do
            git pull --rebase --autostash origin main \
              && git push origin HEAD:main \
              && { echo "Pushed on attempt $attempt."; exit 0; }
            echo "Push attempt $attempt failed; retrying..."
            sleep 5
          done
          echo "Could not push state after 5 attempts." >&2
          exit 1
